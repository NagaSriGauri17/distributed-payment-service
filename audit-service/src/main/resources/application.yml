server:
  port: 8082

spring:
  application:
    name: audit-service

grpc:
  server:
    port: 9096

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","traceId":"%X{traceId}","spanId":"%X{spanId}","service":"audit-service","logger":"%logger{36}","message":"%message"}%n'
